name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: office_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d office_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:4Y3X5G+8VFs5y99pZjYtvYQEZP3pD32OuFXf+cLBOLw=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: office_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: database

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_pgsql
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Migrate PostgreSQL schema
        run: php artisan migrate --force

      - name: Check PHP style
        run: composer lint

      - name: Run tests against PostgreSQL
        run: php artisan test

      - name: Build frontend assets
        run: npm run build
